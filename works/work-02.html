<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イチゴ農家直売所 | studioHAW/U</title>
<meta name="description" content="studioHAW/U の施工事例:イチゴ農家直売所">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDEAE3;
    --ink:#17181A;
    --blueprint:#2B4C7E;
    --steel:#8B8D89;
    --oak:#B08252;
    --white:#FFFFFF;
    --line: rgba(23,24,26,0.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit; text-decoration:none;}
  img{display:block; width:100%; height:100%; object-fit:cover;}
  :focus-visible{ outline:2px solid var(--blueprint); outline-offset:3px; }
  .mono{ font-family:'IBM Plex Mono', monospace; letter-spacing:0.02em; }
  .wrap{ max-width:1180px; margin:0 auto; padding:0 32px; }

  header{
    position:sticky;
    top:0; left:0; right:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:24px 32px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  header .logo{ font-weight:700; font-size:15px; letter-spacing:0.06em; }
  header nav{ display:flex; gap:28px; }
  header nav a{
    font-size:13px;
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.03em;
  }
  header nav a:hover{ color:var(--blueprint); }

  .back-row{ padding:40px 0 0; }
  .back-row a{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--steel);
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .back-row a:hover{ color:var(--blueprint); }

  .project-head{
    padding:32px 0 48px;
    border-bottom:1px solid var(--line);
    margin-bottom:56px;
  }
  .project-head .num{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--blueprint);
    margin-bottom:14px;
    display:block;
  }
  .project-head h1{
    font-size:clamp(28px, 5vw, 48px);
    font-weight:300;
    letter-spacing:0.01em;
  }
  .project-head .year{
    margin-top:16px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--steel);
  }

  .project-hero{
    aspect-ratio:16/9;
    overflow:hidden;
    background:var(--ink);
    margin-bottom:56px;
  }

  .project-body{
    display:grid;
    grid-template-columns:1.1fr 0.9fr;
    gap:72px;
    padding-bottom:120px;
  }
  .project-body p{ font-size:16px; max-width:56ch; }
  .project-body p + p{ margin-top:18px; }

  .spec-list{ border-top:1px solid var(--line); }
  .spec-row{
    display:flex;
    justify-content:space-between;
    gap:20px;
    border-bottom:1px solid var(--line);
    padding:16px 0;
    font-size:14px;
  }
  .spec-row dt{ font-family:'IBM Plex Mono', monospace; color:var(--steel); }
  .spec-row dd{ text-align:right; }

  footer{
    padding:28px 32px;
    display:flex;
    justify-content:space-between;
    background:var(--ink);
    color:var(--steel);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.04em;
  }

  @media (max-width: 860px){
    header nav{ display:none; }
    .project-body{ grid-template-columns:1fr; gap:40px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="../index.html">studioHAW/U</a>
  <nav>

    <a href="../index.html#services">SERVICE</a>
    <a href="../members.html">MEMBERS</a>
    <a href="../index.html#contact">CONTACT</a>
  </nav>
</header>

<div class="wrap">
  <div class="back-row">
    <a href="../index.html#works">&larr; WORKSに戻る</a>
  </div>

  <div class="project-head">
    <span class="num mono">WORK 02</span>
    <h1>イチゴ農家直売所</h1>
    <div class="year">2023</div>
  </div>
</div>

<div class="wrap">

</div>

<div class="wrap">
  <div class="project-body">
    <div>

      <p>[施工の様子や工夫した点について記載してください。]</p>

    <dl class="spec-list">

      <div class="spec-row"><dt>USE</dt><dd>[用途を入力]</dd></div>
      <div class="spec-row"><dt>SCOPE</dt><dd>[設計・施工範囲を入力]</dd></div>
      <div class="spec-row"><dt>YEAR</dt><dd>2023</dd></div>
    </dl>
  </div>
</div>

<footer>
  <span>© <span id="year"></span> studioHAW/U</span>
  <span>ARCHITECTURE / FURNITURE / RENOVATION</span>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
